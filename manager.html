<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>매니저 대시보드 — 질문하는 학교</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<style>
  :root {
    --ink:#0a0a12; --muted:#5a5a7a; --line:#e2e2ec; --bg:#f7f7fb;
    --indigo:#4f46e5; --sky:#0ea5e9; --emerald:#10b981;
    --amber:#f59e0b; --rose:#f43f5e; --violet:#8b5cf6;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

  /* ── TOP BAR ── */
  .topbar{background:#0a0a12;color:white;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .topbar-title{font-size:16px;font-weight:800;display:flex;align-items:center;gap:10px;}
  .topbar-badge{background:var(--violet);border-radius:100px;padding:3px 12px;font-size:11px;font-weight:700;}
  .topbar-right{display:flex;align-items:center;gap:12px;font-size:13px;color:#94a3b8;}
  .topbar-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:white;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
  .topbar-btn:hover{background:rgba(255,255,255,.2);}
  .topbar-btn.danger{border-color:rgba(244,63,94,.4);color:#fda4af;}
  .topbar-btn.danger:hover{background:rgba(244,63,94,.2);}

  /* ── FB STATUS ── */
  #fbBar{padding:10px 32px;font-size:13px;font-weight:600;text-align:center;display:none;}
  #fbBar.ok{background:#ecfdf5;color:#065f46;border-bottom:1px solid #6ee7b7;}
  #fbBar.warn{background:#fffbeb;color:#92400e;border-bottom:1px solid #fcd34d;}
  #fbBar.err{background:#fff1f2;color:#9f1239;border-bottom:1px solid #fda4af;}

  /* ── LAYOUT ── */
  .main{max-width:1400px;margin:0 auto;padding:32px 32px 80px;}
  .page-title{font-size:26px;font-weight:900;margin-bottom:6px;}
  .page-sub{font-size:14px;color:var(--muted);margin-bottom:32px;}

  /* ── STATS ── */
  .stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:32px;}
  .stat-card{background:white;border:1px solid var(--line);border-radius:20px;padding:22px 24px;display:flex;flex-direction:column;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
  .stat-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
  .stat-value{font-size:32px;font-weight:900;line-height:1;}
  .stat-sub{font-size:12px;color:var(--muted);}

  /* ── FILTER BAR ── */
  .filter-bar{background:white;border:1px solid var(--line);border-radius:16px;padding:16px 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
  .filter-label{font-size:12px;font-weight:700;color:var(--muted);}
  .filter-select{padding:8px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:13px;font-family:inherit;color:var(--ink);background:white;outline:none;cursor:pointer;}
  .filter-select:focus{border-color:var(--indigo);}
  .filter-btn{padding:8px 18px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--indigo);color:white;transition:all .2s;}
  .filter-btn:hover{background:#4338ca;}
  .filter-btn.secondary{background:var(--bg);color:var(--ink);border:1.5px solid var(--line);}
  .filter-btn.secondary:hover{border-color:var(--indigo);color:var(--indigo);}

  /* ── TABLE ── */
  .table-wrap{background:white;border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);}
  .table-head{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);}
  .table-title{font-size:15px;font-weight:800;}
  .table-count{font-size:13px;color:var(--muted);}
  table{width:100%;border-collapse:collapse;}
  th{background:#f8fafc;padding:12px 16px;text-align:left;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--line);}
  td{padding:14px 16px;font-size:13px;border-bottom:1px solid #f1f5f9;vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:#fafbff;}
  .tag{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;margin-right:4px;margin-bottom:2px;}
  .tag-blue{background:#e0f2fe;color:#0369a1;}
  .tag-purple{background:#ede9fe;color:#6d28d9;}
  .tag-green{background:#dcfce7;color:#166534;}
  .tag-amber{background:#fef9c3;color:#854d0e;}
  .tag-rose{background:#ffe4e6;color:#9f1239;}
  .q-text{color:#334155;line-height:1.6;font-size:13px;}
  .q-num{display:inline-block;width:22px;height:22px;border-radius:6px;font-size:10px;font-weight:900;color:white;text-align:center;line-height:22px;margin-right:6px;flex-shrink:0;}
  .del-btn{background:none;border:none;color:#cbd5e1;font-size:12px;cursor:pointer;padding:4px 8px;border-radius:6px;font-family:inherit;transition:all .2s;}
  .del-btn:hover{background:#fee2e2;color:var(--rose);}

  /* ── EMPTY ── */
  .empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-icon{font-size:40px;margin-bottom:12px;}
  .empty-text{font-size:15px;font-weight:600;}
  .empty-sub{font-size:13px;margin-top:6px;}

  /* ── LOADING ── */
  .loading{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spinner{display:inline-block;width:20px;height:20px;border:3px solid #e2e8f0;border-top-color:var(--indigo);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px;}

  /* ── TODAY HIGHLIGHT ── */
  .today-badge{background:linear-gradient(135deg,#4f46e5,#0ea5e9);color:white;border-radius:100px;padding:2px 10px;font-size:10px;font-weight:800;margin-left:6px;vertical-align:middle;}

  /* ── TABS ── */
  .tabs{display:flex;gap:4px;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:24px;width:fit-content;}
  .tab{padding:9px 20px;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--muted);background:transparent;transition:all .2s;}
  .tab.active{background:white;color:var(--indigo);box-shadow:0 2px 8px rgba(0,0,0,.1);}

  /* ── SETUP PANEL ── */
  .setup-panel{background:white;border:1.5px solid #fcd34d;border-radius:20px;padding:28px 32px;margin-bottom:28px;}
  .setup-title{font-size:16px;font-weight:800;margin-bottom:8px;}
  .setup-desc{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.7;}
  .setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  .setup-field label{display:block;font-size:12px;font-weight:700;color:#475569;margin-bottom:4px;}
  .setup-field input{width:100%;padding:10px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:13px;font-family:monospace;outline:none;}
  .setup-field input:focus{border-color:var(--indigo);}
  .setup-save-btn{background:linear-gradient(135deg,#4f46e5,#0ea5e9);color:white;border:none;border-radius:12px;padding:12px 28px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}

  @media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr);}.setup-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">
    👑 매니저 대시보드
    <span class="topbar-badge">질문하는 학교</span>
  </div>
  <div class="topbar-right">
    <span id="lastRefresh">-</span>
    <button class="topbar-btn" onclick="loadAll()">🔄 새로고침</button>
    <button class="topbar-btn" onclick="exportCSV()">📥 CSV 내보내기</button>
    <button class="topbar-btn danger" onclick="window.close()">✕ 닫기</button>
  </div>
</div>

<div id="fbBar"></div>

<div class="main">
  <div class="page-title">📊 전체 질문 현황</div>
  <div class="page-sub" id="pageSubText">Firebase에 연결하면 모든 기기의 질문을 실시간으로 볼 수 있습니다.</div>

  <!-- Firebase 미연결 시 설정 패널 -->
  <div class="setup-panel" id="setupPanel" style="display:none;">
    <div class="setup-title">🔥 Firebase 연결 필요</div>
    <div class="setup-desc">
      다른 기기에서 입력한 데이터를 보려면 Firebase를 연결해야 합니다.<br>
      index.html에서 설정한 것과 동일한 config를 입력하세요.
    </div>
    <div class="setup-grid">
      <div class="setup-field"><label>API Key *</label><input id="cfgApiKey" placeholder="AIzaSy..."/></div>
      <div class="setup-field"><label>Auth Domain</label><input id="cfgAuthDomain" placeholder="project.firebaseapp.com"/></div>
      <div class="setup-field"><label>Project ID *</label><input id="cfgProjectId" placeholder="your-project-id"/></div>
      <div class="setup-field"><label>App ID</label><input id="cfgAppId" placeholder="1:000:web:000"/></div>
    </div>
    <button class="setup-save-btn" onclick="saveAndConnect()">저장 & 연결</button>
  </div>

  <!-- 통계 -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">전체 질문</div>
      <div class="stat-value" id="statTotal" style="color:var(--indigo);">-</div>
      <div class="stat-sub">누적 전체</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">오늘 질문</div>
      <div class="stat-value" id="statToday" style="color:var(--emerald);">-</div>
      <div class="stat-sub" id="statTodayDate">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">학생 질문</div>
      <div class="stat-value" id="statStudent" style="color:var(--sky);">-</div>
      <div class="stat-sub">student role</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">교사 질문</div>
      <div class="stat-value" id="statTeacher" style="color:var(--amber);">-</div>
      <div class="stat-sub">teacher role</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">참여 인원</div>
      <div class="stat-value" id="statUsers" style="color:var(--violet);">-</div>
      <div class="stat-sub">고유 사용자</div>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('all', this)">전체</button>
    <button class="tab" onclick="switchTab('today', this)">오늘만</button>
    <button class="tab" onclick="switchTab('student', this)">학생</button>
    <button class="tab" onclick="switchTab('teacher', this)">교사</button>
  </div>

  <!-- 필터 -->
  <div class="filter-bar">
    <span class="filter-label">필터</span>
    <select class="filter-select" id="fGrade" onchange="applyFilter()">
      <option value="all">전체 학년</option>
      <option>1학년</option><option>2학년</option><option>3학년</option>
    </select>
    <select class="filter-select" id="fSubject" onchange="applyFilter()">
      <option value="all">전체 과목</option>
      <option>국어</option><option>수학</option><option>사회</option><option>과학</option>
      <option>영어</option><option>역사</option><option>도덕</option><option>기술·가정</option>
      <option>정보</option><option>음악</option><option>미술</option><option>체육</option><option>진로</option>
    </select>
    <input type="text" id="fSearch" placeholder="주제·질문 검색..." style="padding:8px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:13px;font-family:inherit;outline:none;min-width:180px;" oninput="applyFilter()" onfocus="this.style.borderColor='var(--indigo)'" onblur="this.style.borderColor='var(--line)'"/>
    <button class="filter-btn secondary" onclick="resetFilter()">초기화</button>
  </div>

  <!-- 테이블 -->
  <div class="table-wrap">
    <div class="table-head">
      <div class="table-title">질문 목록</div>
      <div class="table-count" id="tableCount">-</div>
    </div>
    <div id="tableBody">
      <div class="loading"><span class="spinner"></span>데이터를 불러오는 중...</div>
    </div>
  </div>
</div>

<!-- Firebase Module -->
<script type="module">
  import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, getDocs, deleteDoc, doc, query, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  let db = null;
  let allData = [];
  let filteredData = [];
  let currentTab = 'all';

  // ── Firebase 초기화 ──
  async function initFirebase(cfg) {
    try {
      const app = getApps().length ? getApps()[0] : initializeApp(cfg);
      db = getFirestore(app);
      return true;
    } catch(e) {
      console.error('[Manager] Firebase 초기화 실패:', e);
      return false;
    }
  }

  window.saveAndConnect = async function() {
    const cfg = {
      apiKey:        document.getElementById('cfgApiKey').value.trim(),
      authDomain:    document.getElementById('cfgAuthDomain').value.trim(),
      projectId:     document.getElementById('cfgProjectId').value.trim(),
      appId:         document.getElementById('cfgAppId').value.trim(),
    };
    if (!cfg.apiKey || !cfg.projectId) { alert('API Key와 Project ID는 필수입니다.'); return; }
    localStorage.setItem('qschool_firebase_config', JSON.stringify(cfg));
    const ok = await initFirebase(cfg);
    if (ok) {
      document.getElementById('setupPanel').style.display = 'none';
      setFbBar('ok', '🔥 Firebase 연결 성공! 모든 기기의 데이터를 불러옵니다.');
      await loadAll();
    } else {
      alert('연결 실패. API Key와 Project ID를 확인해주세요.');
    }
  };

  // ── 전체 데이터 로드 ──
  window.loadAll = async function() {
    document.getElementById('tableBody').innerHTML = '<div class="loading"><span class="spinner"></span>Firebase에서 데이터를 불러오는 중...</div>';

    if (db) {
      try {
        const q = query(collection(db, 'questions'), orderBy('id', 'desc'), limit(1000));
        const snap = await getDocs(q);
        allData = snap.docs.map(d => ({ ...d.data(), _docId: d.id }));
        setFbBar('ok', `🔥 Firebase 연결됨 — 전체 ${allData.length}개 질문 로드 완료`);
      } catch(e) {
        console.warn('[Manager] Firebase 로드 실패:', e);
        allData = getLocalData();
        setFbBar('warn', '⚠️ Firebase 로드 실패 — 이 기기의 로컬 데이터만 표시됩니다: ' + e.message);
      }
    } else {
      allData = getLocalData();
      setFbBar('warn', '⚠️ Firebase 미연결 — 이 기기의 로컬 데이터만 표시됩니다. 다른 기기 데이터를 보려면 Firebase를 연결하세요.');
    }

    updateStats();
    applyFilter();
    document.getElementById('lastRefresh').textContent = '최근 갱신: ' + new Date().toLocaleTimeString('ko-KR');
  };

  function getLocalData() {
    try {
      return JSON.parse(localStorage.getItem('myq_list') || '[]');
    } catch(e) { return []; }
  }

  // ── 탭 전환 ──
  window.switchTab = function(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    applyFilter();
  };

  // ── 필터 적용 ──
  window.applyFilter = function() {
    const grade   = document.getElementById('fGrade').value;
    const subject = document.getElementById('fSubject').value;
    const search  = document.getElementById('fSearch').value.trim().toLowerCase();

    const todayStr = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\. /g,'.').replace('.','.');

    filteredData = allData.filter(e => {
      if (currentTab === 'today') {
        if (!e.date || !e.date.includes(getTodayPrefix())) return false;
      }
      if (currentTab === 'student' && e.role !== 'student') return false;
      if (currentTab === 'teacher' && e.role !== 'teacher') return false;
      if (grade   !== 'all' && e.grade   !== grade)   return false;
      if (subject !== 'all' && e.subject !== subject) return false;
      if (search) {
        const haystack = [e.topic, e.q1, e.q2, e.q3, e.grade, e.subject, e.userKey, e.authorKey].join(' ').toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });

    renderTable();
  };

  function getTodayPrefix() {
    const now = new Date();
    return `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  }

  window.resetFilter = function() {
    document.getElementById('fGrade').value = 'all';
    document.getElementById('fSubject').value = 'all';
    document.getElementById('fSearch').value = '';
    applyFilter();
  };

  // ── 통계 업데이트 ──
  function updateStats() {
    const todayPrefix = getTodayPrefix();
    const todayList = allData.filter(e => e.date && e.date.startsWith(todayPrefix));
    const users = new Set(allData.map(e => e.userKey || e.authorKey).filter(Boolean));

    document.getElementById('statTotal').textContent   = allData.length;
    document.getElementById('statToday').textContent   = todayList.length;
    document.getElementById('statTodayDate').textContent = todayPrefix;
    document.getElementById('statStudent').textContent = allData.filter(e => e.role === 'student').length;
    document.getElementById('statTeacher').textContent = allData.filter(e => e.role === 'teacher').length;
    document.getElementById('statUsers').textContent   = users.size;
    document.getElementById('pageSubText').textContent = `총 ${allData.length}개의 질문이 기록되어 있습니다. (${users.size}명 참여)`;
  }

  // ── 테이블 렌더링 ──
  function renderTable() {
    const todayPrefix = getTodayPrefix();
    document.getElementById('tableCount').textContent = `${filteredData.length}개`;

    if (!filteredData.length) {
      document.getElementById('tableBody').innerHTML = `
        <div class="empty">
          <div class="empty-icon">📭</div>
          <div class="empty-text">표시할 질문이 없습니다</div>
          <div class="empty-sub">필터 조건을 변경하거나 Firebase를 연결해주세요</div>
        </div>`;
      return;
    }

    const rows = filteredData.map((e, i) => {
      const isToday = e.date && e.date.startsWith(todayPrefix);
      const roleTag = e.role === 'teacher'
        ? '<span class="tag tag-amber">👩‍🏫 교사</span>'
        : '<span class="tag tag-blue">🎒 학생</span>';
      const gradeTag = e.grade ? `<span class="tag tag-purple">${e.grade}</span>` : '';
      const subjTag  = e.subject ? `<span class="tag tag-green">${e.subject}</span>` : '';

      const qs = [
        e.q1 ? `<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;"><span class="q-num" style="background:#0ea5e9;">Q1</span><span class="q-text">${e.q1}</span></div>` : '',
        e.q2 ? `<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;"><span class="q-num" style="background:#8b5cf6;">Q2</span><span class="q-text">${e.q2}</span></div>` : '',
        e.q3 ? `<div style="display:flex;align-items:flex-start;gap:6px;"><span class="q-num" style="background:#10b981;">Q3</span><span class="q-text">${e.q3}</span></div>` : '',
      ].filter(Boolean).join('');

      const userDisplay = e.userKey || e.authorKey || '비로그인';
      const topicDisplay = e.topic
        ? `<div style="font-weight:700;font-size:13px;color:var(--ink);margin-bottom:4px;">${e.topic}</div>`
        : '';

      return `<tr>
        <td style="font-size:12px;color:var(--muted);white-space:nowrap;">${i+1}</td>
        <td>
          ${roleTag}${gradeTag}${subjTag}
          ${isToday ? '<span class="today-badge">TODAY</span>' : ''}
        </td>
        <td style="max-width:140px;font-size:12px;color:var(--muted);word-break:break-all;">${userDisplay}</td>
        <td style="max-width:100px;">
          ${topicDisplay}
          ${e.unit ? `<div style="font-size:11px;color:var(--muted);">${e.unit}</div>` : ''}
        </td>
        <td style="min-width:320px;">${qs}</td>
        <td style="font-size:11px;color:var(--muted);white-space:nowrap;">${e.date || ''}</td>
        <td><button class="del-btn" onclick="deleteEntry('${e._docId || ''}', '${e.userKey || e.authorKey || ''}', ${e.id})">삭제</button></td>
      </tr>`;
    }).join('');

    document.getElementById('tableBody').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th><th>구분</th><th>사용자</th><th>주제/단원</th><th>질문 내용</th><th>날짜</th><th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── 삭제 ──
  window.deleteEntry = async function(docId, userKey, id) {
    if (!confirm('이 질문을 삭제할까요?')) return;
    // Firebase 삭제
    if (db && docId) {
      try { await deleteDoc(doc(db, 'questions', docId)); } catch(e) { console.warn(e); }
    }
    // 로컬 삭제
    try {
      const list = JSON.parse(localStorage.getItem('myq_list') || '[]').filter(e => String(e.id) !== String(id));
      localStorage.setItem('myq_list', JSON.stringify(list));
    } catch(e) {}
    allData = allData.filter(e => e._docId !== docId && String(e.id) !== String(id));
    updateStats();
    applyFilter();
  };

  // ── CSV 내보내기 ──
  window.exportCSV = function() {
    const data = filteredData.length ? filteredData : allData;
    if (!data.length) { alert('내보낼 데이터가 없습니다.'); return; }
    const header = ['번호','역할','학년','과목','단원','주제','Q1','Q2','Q3','날짜','사용자'];
    const rows = data.map((e, i) => [
      i+1, e.role==='teacher'?'교사':'학생',
      e.grade||'', e.subject||'', e.unit||'', e.topic||'',
      e.q1||'', e.q2||'', e.q3||'', e.date||'',
      e.userKey||e.authorKey||''
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));

    const csv = '\uFEFF' + [header.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `질문하는학교_${getTodayPrefix()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // ── FB 상태 바 ──
  function setFbBar(type, msg) {
    const bar = document.getElementById('fbBar');
    bar.className = type;
    bar.textContent = msg;
    bar.style.display = 'block';
  }

  // ── 페이지 로드 ──
  document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('statTodayDate').textContent = getTodayPrefix();

    const saved = localStorage.getItem('qschool_firebase_config');
    if (saved) {
      try {
        const cfg = JSON.parse(saved);
        // 저장된 값 폼에 채우기
        if (document.getElementById('cfgApiKey'))     document.getElementById('cfgApiKey').value     = cfg.apiKey || '';
        if (document.getElementById('cfgAuthDomain')) document.getElementById('cfgAuthDomain').value = cfg.authDomain || '';
        if (document.getElementById('cfgProjectId'))  document.getElementById('cfgProjectId').value  = cfg.projectId || '';
        if (document.getElementById('cfgAppId'))      document.getElementById('cfgAppId').value      = cfg.appId || '';

        if (cfg.apiKey && cfg.projectId) {
          const ok = await initFirebase(cfg);
          if (ok) {
            setFbBar('ok', '🔥 Firebase 연결 중...');
            await loadAll();
            return;
          }
        }
      } catch(e) {}
    }

    // Firebase 없음 → 로컬 데이터 로드 + 설정 패널 표시
    document.getElementById('setupPanel').style.display = 'block';
    setFbBar('warn', '⚠️ Firebase 미연결 — 이 기기의 로컬 데이터만 표시됩니다.');
    await loadAll();
  });
</script>
</body>
</html>
