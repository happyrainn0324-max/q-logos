<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>매니저 대시보드 — 인천공항중학교</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"/>
<style>
  :root {
    --ink: #0a0a12; --ink2: #1e1e2e; --muted: #5a5a7a; --line: #e2e2ec;
    --bg: #f4f4f8; --white: #fff;
    --indigo: #4f46e5; --violet: #7c3aed; --sky: #0ea5e9;
    --teal: #14b8a6; --emerald: #10b981; --amber: #f59e0b;
    --rose: #f43f5e; --pink: #ec4899;
    --radius: 20px; --radius-sm: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.6; }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e3a5f 100%);
    padding: 28px 40px; display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 24px rgba(0,0,0,.3);
  }
  .header-left h1 { font-size: 22px; font-weight: 900; color: white; letter-spacing: -.02em; }
  .header-left p { font-size: 13px; color: rgba(255,255,255,.6); margin-top: 3px; }
  .header-badge {
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
    border-radius: 100px; padding: 8px 20px;
    font-size: 13px; font-weight: 700; color: white;
    display: flex; align-items: center; gap: 8px;
  }
  .header-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

  /* ── TABS ── */
  .tabs { display: flex; gap: 0; background: white; border-bottom: 1px solid var(--line); padding: 0 40px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .tab { padding: 16px 22px; font-size: 14px; font-weight: 700; color: var(--muted); border: none; background: transparent; cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; font-family: inherit; display: flex; align-items: center; gap: 7px; }
  .tab:hover { color: var(--indigo); }
  .tab.active { color: var(--indigo); border-bottom-color: var(--indigo); }

  /* ── MAIN ── */
  .main { max-width: 1400px; margin: 0 auto; padding: 32px 40px; }
  .panel { display: none; }
  .panel.active { display: block; animation: fadeUp .3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

  /* ── CARDS ── */
  .stat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: white; border-radius: var(--radius); padding: 22px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06); border-left: 4px solid var(--indigo);
    transition: transform .2s, box-shadow .2s;
  }
  .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.1); }
  .stat-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
  .stat-value { font-size: 32px; font-weight: 900; color: var(--ink); line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* ── SECTION TITLE ── */
  .sec-title { font-size: 17px; font-weight: 800; color: var(--ink); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .sec-title .badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 100px; background: rgba(79,70,229,.1); color: var(--indigo); }

  /* ── TABLE ── */
  .tbl-wrap { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-bottom: 28px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: linear-gradient(135deg, #1e1b4b, #312e81); }
  thead th { padding: 13px 16px; color: white; font-weight: 700; text-align: left; font-size: 12px; letter-spacing: .05em; }
  tbody tr { border-bottom: 1px solid var(--line); transition: background .15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8f8ff; }
  tbody td { padding: 12px 16px; color: var(--ink); vertical-align: middle; }
  .tag { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; }
  .tag-blue  { background: rgba(14,165,233,.12); color: #0369a1; }
  .tag-violet{ background: rgba(124,58,237,.12); color: #6d28d9; }
  .tag-green { background: rgba(16,185,129,.12); color: #047857; }
  .tag-amber { background: rgba(245,158,11,.12); color: #92400e; }
  .tag-rose  { background: rgba(244,63,94,.12);  color: #be123c; }
  .tag-gray  { background: rgba(90,90,122,.1);   color: var(--muted); }

  /* ── FILTERS ── */
  .filter-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-row select, .filter-row input {
    padding: 8px 14px; border: 1.5px solid var(--line); border-radius: var(--radius-sm);
    font-size: 13px; font-family: inherit; color: var(--ink); background: white; outline: none;
    transition: border-color .2s;
  }
  .filter-row select:focus, .filter-row input:focus { border-color: var(--indigo); }
  .filter-btn {
    padding: 8px 18px; background: var(--indigo); color: white; border: none;
    border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all .2s;
  }
  .filter-btn:hover { background: #4338ca; }
  .export-btn {
    padding: 8px 18px; background: var(--emerald); color: white; border: none;
    border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: all .2s; margin-left: auto;
  }
  .export-btn:hover { background: #059669; }

  /* ── CHART BARS ── */
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 12px; }
  .bar-label { font-size: 13px; font-weight: 600; color: var(--ink); width: 120px; flex-shrink: 0; text-align: right; }
  .bar-track { flex: 1; height: 26px; background: #f1f1f8; border-radius: 100px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 100px; transition: width 1s ease; display: flex; align-items: center; padding-left: 10px; font-size: 11px; font-weight: 700; color: white; min-width: 28px; }
  .bar-num { font-size: 13px; font-weight: 800; color: var(--ink); width: 36px; flex-shrink: 0; }

  /* ── GRID LAYOUT ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .card-box { background: white; border-radius: var(--radius); padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }

  /* ── USER CARD ── */
  .member-card {
    background: white; border-radius: var(--radius-sm); padding: 16px 20px;
    border: 1.5px solid var(--line); display: flex; align-items: center; gap: 14px;
    margin-bottom: 10px; transition: all .2s;
  }
  .member-card:hover { border-color: var(--indigo); box-shadow: 0 4px 14px rgba(79,70,229,.1); }
  .member-avatar {
    width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: white;
  }
  .member-info { flex: 1; }
  .member-name { font-size: 15px; font-weight: 800; color: var(--ink); }
  .member-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .member-stats { display: flex; gap: 14px; }
  .member-stat { text-align: center; }
  .member-stat .n { font-size: 18px; font-weight: 900; color: var(--indigo); }
  .member-stat .l { font-size: 10px; color: var(--muted); font-weight: 600; }

  /* ── ATTENDANCE ── */
  .attend-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; }
  .attend-day { width: 100%; aspect-ratio: 1; border-radius: 4px; background: #f1f1f8; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--muted); position: relative; cursor: default; }
  .attend-day.has-entry { background: #4f46e5; color: white; }
  .attend-day.has-entry:hover::after { content: attr(data-tip); position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #1e1b4b; color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; white-space: nowrap; z-index: 10; }
  .month-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }

  /* ── Q CARD ── */
  .q-card { background: #f8f8ff; border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 8px; border-left: 3px solid var(--indigo); }
  .q-card-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
  .q-card-qs { display: flex; flex-direction: column; gap: 5px; }
  .q-card-q { font-size: 13px; color: var(--ink); display: flex; gap: 8px; align-items: flex-start; }
  .q-card-num { font-size: 10px; font-weight: 800; color: white; background: var(--indigo); padding: 2px 7px; border-radius: 100px; flex-shrink: 0; margin-top: 2px; }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; font-weight: 600; }

  /* ── SEARCH ── */
  .search-box { position: relative; }
  .search-box input { padding-left: 36px; width: 220px; }
  .search-box::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; }

  /* ── ACCESS GATE ── */
  .gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1e1b4b, #312e81, #1e3a5f); }
  .gate-box { background: white; border-radius: 28px; padding: 48px 40px; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 32px 80px rgba(0,0,0,.3); }
  .gate-icon { font-size: 56px; margin-bottom: 16px; }
  .gate-title { font-size: 22px; font-weight: 900; color: var(--ink); margin-bottom: 8px; }
  .gate-desc { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.7; }
  .gate-input { width: 100%; padding: 13px 16px; border: 2px solid var(--line); border-radius: 12px; font-size: 15px; font-family: inherit; outline: none; margin-bottom: 12px; transition: border-color .2s; }
  .gate-input:focus { border-color: var(--indigo); }
  .gate-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--violet), var(--indigo)); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit; transition: all .2s; }
  .gate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,70,229,.4); }
  .gate-err { font-size: 13px; color: var(--rose); margin-top: 8px; min-height: 20px; }

  .refresh-btn { padding: 8px 16px; background: white; color: var(--indigo); border: 1.5px solid var(--indigo); border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .2s; }
  .refresh-btn:hover { background: var(--indigo); color: white; }

  @media (max-width: 900px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .two-col, .three-col { grid-template-columns: 1fr; }
    .main { padding: 20px; }
    .tabs { padding: 0 16px; overflow-x: auto; }
    .header { padding: 20px; flex-direction: column; gap: 12px; align-items: flex-start; }
  }
</style>
</head>
<body>

<!-- ── ACCESS GATE ── -->
<div id="gate" class="gate">
  <div class="gate-box">
    <div class="gate-icon">👑</div>
    <div class="gate-title">매니저 대시보드</div>
    <div class="gate-desc">인천공항중학교 질문하는 학교<br>매니저 전용 분석 페이지입니다.<br>이름과 비밀번호를 입력해주세요.</div>
    <input class="gate-input" id="gateUser" placeholder="이름 (예: 조유진)" />
    <input class="gate-input" type="password" id="gatePass" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkGate()"/>
    <button class="gate-btn" onclick="checkGate()">입장하기 →</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard" style="display:none;">

  <div class="header">
    <div class="header-left">
      <h1>👑 매니저 대시보드</h1>
      <p>인천공항중학교 · 질문하는 학교 · 관리자: 조유진</p>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <button class="refresh-btn" onclick="loadAll()">🔄 새로고침</button>
      <div class="header-badge"><span class="dot"></span> <span id="lastUpdate">로딩 중...</span></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview', this)">📊 전체 현황</button>
    <button class="tab" onclick="switchTab('members', this)">👤 회원 분석</button>
    <button class="tab" onclick="switchTab('questions', this)">❓ 질문 모아보기</button>
    <button class="tab" onclick="switchTab('attendance', this)">📅 출석 분석</button>
    <button class="tab" onclick="switchTab('mission', this)">🎮 미션 분석</button>
  </div>

  <div class="main">

    <!-- ── 전체 현황 ── -->
    <div class="panel active" id="panel-overview">
      <div class="stat-grid" id="overviewStats"></div>
      <div class="two-col">
        <div class="card-box">
          <div class="sec-title">📚 과목별 질문 수</div>
          <div class="bar-chart" id="subjectChart"></div>
        </div>
        <div class="card-box">
          <div class="sec-title">🎓 학년별 참여 현황</div>
          <div class="bar-chart" id="gradeChart"></div>
        </div>
      </div>
      <div class="two-col">
        <div class="card-box">
          <div class="sec-title">📅 최근 7일 활동</div>
          <div class="bar-chart" id="weekChart"></div>
        </div>
        <div class="card-box">
          <div class="sec-title">🏷️ 역할별 참여</div>
          <div class="bar-chart" id="roleChart"></div>
        </div>
      </div>
      <div class="card-box" style="margin-bottom:28px;">
        <div class="sec-title">🔥 최근 저장된 질문 <span class="badge" id="recentBadge">0건</span></div>
        <div id="recentList"></div>
      </div>
    </div>

    <!-- ── 회원 분석 ── -->
    <div class="panel" id="panel-members">
      <div class="filter-row">
        <select id="memberTypeFilter" onchange="renderMembers()">
          <option value="all">전체 유형</option>
          <option value="student">학생</option>
          <option value="parent">학부모</option>
          <option value="staff">교직원</option>
        </select>
        <div class="search-box">
          <input type="text" id="memberSearch" placeholder="이름 검색..." oninput="renderMembers()"/>
        </div>
        <select id="memberSort" onchange="renderMembers()">
          <option value="questions">질문 많은순</option>
          <option value="recent">최근 활동순</option>
          <option value="name">이름순</option>
        </select>
        <button class="export-btn" onclick="exportMembers()">⬇ CSV 내보내기</button>
      </div>
      <div id="memberStats" class="stat-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px;"></div>
      <div id="memberList"></div>
    </div>

    <!-- ── 질문 모아보기 ── -->
    <div class="panel" id="panel-questions">
      <div class="filter-row">
        <select id="qGradeFilter" onchange="renderAllQuestions()">
          <option value="all">전체 학년</option>
          <option>1학년</option><option>2학년</option><option>3학년</option>
        </select>
        <select id="qSubjectFilter" onchange="renderAllQuestions()">
          <option value="all">전체 과목</option>
          <option>국어</option><option>수학</option><option>사회</option><option>과학</option>
          <option>영어</option><option>역사</option><option>도덕</option><option>기술·가정</option>
          <option>정보</option><option>음악</option><option>미술</option><option>체육</option><option>진로</option>
        </select>
        <select id="qRoleFilter" onchange="renderAllQuestions()">
          <option value="all">전체 역할</option>
          <option value="student">학생</option>
          <option value="teacher">교사</option>
        </select>
        <div class="search-box">
          <input type="text" id="qSearch" placeholder="질문 내용 검색..." oninput="renderAllQuestions()"/>
        </div>
        <button class="export-btn" onclick="exportQuestions()">⬇ CSV 내보내기</button>
      </div>
      <div id="qCount" style="font-size:14px;font-weight:700;color:var(--muted);margin-bottom:14px;"></div>
      <div id="questionList"></div>
    </div>

    <!-- ── 출석 분석 ── -->
    <div class="panel" id="panel-attendance">
      <div class="filter-row">
        <select id="attendFilter" onchange="renderAttendance()">
          <option value="all">전체 회원</option>
          <option value="student">학생만</option>
          <option value="staff">교직원만</option>
        </select>
        <select id="attendSort" onchange="renderAttendance()">
          <option value="days">출석일수 많은순</option>
          <option value="total">총 질문수 많은순</option>
          <option value="recent">최근 활동순</option>
        </select>
        <button class="export-btn" onclick="exportAttendance()">⬇ CSV 내보내기</button>
      </div>
      <div class="stat-grid" id="attendStats" style="margin-bottom:20px;"></div>
      <div id="attendList"></div>
    </div>

    <!-- ── 미션 분석 ── -->
    <div class="panel" id="panel-mission">
      <div class="three-col" id="missionStats"></div>
      <div class="two-col">
        <div class="card-box">
          <div class="sec-title">🎰 키워드 게임 현황</div>
          <div id="missionKw"></div>
        </div>
        <div class="card-box">
          <div class="sec-title">🏆 질문 챔피언 현황</div>
          <div id="missionChamp"></div>
        </div>
      </div>
      <div class="two-col">
        <div class="card-box">
          <div class="sec-title">⏰ 타임머신 현황</div>
          <div id="missionDream"></div>
        </div>
        <div class="card-box">
          <div class="sec-title">📚 북콘서트 현황</div>
          <div id="missionBook"></div>
        </div>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /dashboard -->

<script>
  // ── 접근 제어 ──
  const MANAGER_NAME = '조유진';
  const MANAGER_PASS = '1111';   // 필요 시 변경

  function checkGate() {
    const name = document.getElementById('gateUser').value.trim();
    const pass = document.getElementById('gatePass').value;
    if (name === MANAGER_NAME && pass === MANAGER_PASS) {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadAll();
    } else {
      document.getElementById('gateErr').textContent = '이름 또는 비밀번호가 올바르지 않습니다.';
    }
  }

  // ── 탭 전환 ──
  function switchTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-' + id).classList.add('active');
  }

  // ── 데이터 로드 ──
  let allEntries = [];   // myq_list
  let allMembers = [];   // 회원 목록 (shared storage에서)

  async function loadAll() {
    document.getElementById('lastUpdate').textContent = '로딩 중...';

    // 1. 질문 데이터 (localStorage myq_list는 이 브라우저 것, shared에서도 수집)
    allEntries = JSON.parse(localStorage.getItem('myq_list') || '[]');

    // shared storage에서 전체 질문 수집
    if (typeof window.storage !== 'undefined') {
      try {
        const keyResult = await window.storage.list('qentry:', true);
        const keys = keyResult?.keys || [];
        const sharedEntries = [];
        for (const k of keys) {
          try {
            const r = await window.storage.get(k, true);
            if (r) sharedEntries.push(JSON.parse(r.value));
          } catch(e) {}
        }
        // 중복 제거 (id 기준)
        const localIds = new Set(allEntries.map(e => e.id));
        sharedEntries.forEach(e => { if (!localIds.has(e.id)) allEntries.push(e); });
      } catch(e) {}

      // 2. 회원 데이터 수집
      try {
        const userKeys = await window.storage.list('qschool_user:', true);
        const ukeys = userKeys?.keys || [];
        allMembers = [];
        for (const k of ukeys) {
          try {
            const r = await window.storage.get(k, true);
            if (r) allMembers.push(JSON.parse(r.value));
          } catch(e) {}
        }
      } catch(e) {}
    }

    // 최신순 정렬
    allEntries.sort((a, b) => b.id - a.id);

    renderOverview();
    renderMembers();
    renderAllQuestions();
    renderAttendance();
    renderMission();

    document.getElementById('lastUpdate').textContent =
      '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
  }

  // ────────────────────────────────
  // ① 전체 현황
  // ────────────────────────────────
  function renderOverview() {
    const total = allEntries.length;
    const students = allEntries.filter(e => e.role === 'student').length;
    const teachers = allEntries.filter(e => e.role === 'teacher').length;
    const uniqueAuthors = new Set(allEntries.filter(e=>e.authorKey).map(e=>e.authorKey)).size;
    const todayStr = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\. /g,'.').replace(/\.$/,'');
    const todayCount = allEntries.filter(e => e.date && e.date.startsWith(todayStr.replace(/\./g,'.'))).length;

    document.getElementById('overviewStats').innerHTML = [
      { label:'총 질문 기록', value: total, sub:'누적 전체', color:'#4f46e5' },
      { label:'학생 질문', value: students, sub:`전체의 ${total?Math.round(students/total*100):0}%`, color:'#0ea5e9' },
      { label:'교사 질문', value: teachers, sub:`수업 설계용`, color:'#f59e0b' },
      { label:'참여 회원', value: uniqueAuthors, sub:'질문 저장 기준', color:'#10b981' },
      { label:'오늘 활동', value: todayCount, sub:'오늘 저장된 질문', color:'#f43f5e' },
    ].map(s => `
      <div class="stat-card" style="border-left-color:${s.color}">
        <div class="stat-label">${s.label}</div>
        <div class="stat-value" style="color:${s.color}">${s.value}</div>
        <div class="stat-sub">${s.sub}</div>
      </div>`).join('');

    // 과목별
    const subjectMap = {};
    allEntries.forEach(e => { subjectMap[e.subject] = (subjectMap[e.subject]||0)+1; });
    renderBarChart('subjectChart', subjectMap, '#4f46e5');

    // 학년별
    const gradeMap = {};
    allEntries.forEach(e => { if(e.grade) gradeMap[e.grade] = (gradeMap[e.grade]||0)+1; });
    renderBarChart('gradeChart', gradeMap, '#0ea5e9');

    // 최근 7일
    const weekMap = {};
    for (let i=6; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const key = d.toLocaleDateString('ko-KR', {month:'2-digit',day:'2-digit'}).replace('. ','월 ').replace('.',`일`);
      weekMap[key] = 0;
    }
    allEntries.forEach(e => {
      if (!e.date) return;
      const parts = e.date.split(' ')[0]; // yyyy.mm.dd
      try {
        const d = new Date(parts.replace(/\./g,'-'));
        const key = d.toLocaleDateString('ko-KR', {month:'2-digit',day:'2-digit'}).replace('. ','월 ').replace('.',`일`);
        if (weekMap[key] !== undefined) weekMap[key]++;
      } catch(e) {}
    });
    renderBarChart('weekChart', weekMap, '#10b981');

    // 역할별
    const roleMap = { '학생': students, '교사': teachers };
    renderBarChart('roleChart', roleMap, '#f59e0b');

    // 최근 질문
    const recent = allEntries.slice(0, 8);
    document.getElementById('recentBadge').textContent = total + '건';
    document.getElementById('recentList').innerHTML = recent.length ? recent.map(e => `
      <div class="q-card">
        <div class="q-card-meta">
          <span>${e.role === 'teacher' ? '👩‍🏫 교사' : '🎒 학생'}</span>
          <span>${e.grade||''}</span><span>${e.subject||''}</span>
          ${e.unit ? `<span>${e.unit}</span>` : ''}
          <span style="margin-left:auto;color:#94a3b8">${e.date||''}</span>
        </div>
        <div class="q-card-qs">
          ${[e.q1,e.q2,e.q3].filter(Boolean).map((q,i)=>`
            <div class="q-card-q"><span class="q-card-num">Q${i+1}</span><span>${q}</span></div>`).join('')}
        </div>
      </div>`).join('') : '<div class="empty"><div class="icon">📭</div><p>저장된 질문이 없습니다</p></div>';
  }

  function renderBarChart(containerId, dataMap, color) {
    const el = document.getElementById(containerId);
    const entries = Object.entries(dataMap).sort((a,b) => b[1]-a[1]);
    const max = Math.max(...entries.map(e=>e[1]), 1);
    el.innerHTML = entries.length ? entries.map(([label, val]) => `
      <div class="bar-row">
        <div class="bar-label">${label}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.max(val/max*100,2)}%;background:${color}">${val}</div>
        </div>
        <div class="bar-num">${val}</div>
      </div>`).join('') : '<p style="color:var(--muted);font-size:13px;">데이터 없음</p>';
  }

  // ────────────────────────────────
  // ② 회원 분석
  // ────────────────────────────────
  function getAuthorLabel(key) {
    if (!key) return '(비회원)';
    const parts = key.split('_');
    if (parts[0] === 'student') return `${parts[2]||''} 학생 (${parts[1]||''})`;
    if (parts[0] === 'parent')  return `${parts[1]||''} 학부모`;
    if (parts[0] === 'staff')   return `${parts[2]||''} 선생님`;
    return key;
  }

  function renderMembers() {
    const typeFilter = document.getElementById('memberTypeFilter').value;
    const search = document.getElementById('memberSearch').value.toLowerCase();
    const sort = document.getElementById('memberSort').value;

    // authorKey 기준으로 집계
    const authorMap = {};
    allEntries.forEach(e => {
      const k = e.authorKey || '(비회원)';
      if (!authorMap[k]) authorMap[k] = { key: k, entries: [], lastDate: '' };
      authorMap[k].entries.push(e);
      if (!authorMap[k].lastDate || e.date > authorMap[k].lastDate) authorMap[k].lastDate = e.date||'';
    });

    // shared 회원도 추가
    allMembers.forEach(m => {
      if (!authorMap[m.key]) authorMap[m.key] = { key: m.key, entries: [], lastDate: '', memberData: m };
      else authorMap[m.key].memberData = m;
    });

    let list = Object.values(authorMap);

    // 타입 필터
    if (typeFilter !== 'all') {
      list = list.filter(a => a.key.startsWith(typeFilter));
    }
    // 검색
    if (search) {
      list = list.filter(a => getAuthorLabel(a.key).toLowerCase().includes(search));
    }
    // 정렬
    if (sort === 'questions') list.sort((a,b) => b.entries.length - a.entries.length);
    else if (sort === 'recent') list.sort((a,b) => (b.lastDate||'') > (a.lastDate||'') ? 1 : -1);
    else list.sort((a,b) => getAuthorLabel(a.key).localeCompare(getAuthorLabel(b.key)));

    // 통계
    const totalMembers = list.length;
    const activeMembers = list.filter(a => a.entries.length > 0).length;
    const avgQ = totalMembers ? (list.reduce((s,a)=>s+a.entries.length,0)/totalMembers).toFixed(1) : 0;
    const top = list[0];
    document.getElementById('memberStats').innerHTML = [
      { label:'전체 회원', value: totalMembers, color:'#4f46e5' },
      { label:'질문 작성 회원', value: activeMembers, color:'#10b981' },
      { label:'인당 평균 질문수', value: avgQ, color:'#0ea5e9' },
      { label:'최다 질문 회원', value: top ? getAuthorLabel(top.key).split(' ')[0] : '-', color:'#f59e0b' },
    ].map(s => `
      <div class="stat-card" style="border-left-color:${s.color}">
        <div class="stat-label">${s.label}</div>
        <div class="stat-value" style="color:${s.color};font-size:22px">${s.value}</div>
      </div>`).join('');

    const colors = ['#4f46e5','#0ea5e9','#10b981','#f59e0b','#f43f5e','#8b5cf6','#14b8a6','#ec4899'];
    document.getElementById('memberList').innerHTML = list.length ? list.map((a, idx) => {
      const label = getAuthorLabel(a.key);
      const initial = label.replace(/[^가-힣a-zA-Z]/g,'').charAt(0) || '?';
      const color = colors[idx % colors.length];
      const subjects = [...new Set(a.entries.map(e=>e.subject).filter(Boolean))].slice(0,3).join(', ');
      const typeKey = a.key.split('_')[0];
      const typeTag = typeKey === 'student' ? '<span class="tag tag-blue">학생</span>'
                    : typeKey === 'parent'  ? '<span class="tag tag-green">학부모</span>'
                    : typeKey === 'staff'   ? '<span class="tag tag-violet">교직원</span>'
                    : '<span class="tag tag-gray">비회원</span>';
      return `
        <div class="member-card">
          <div class="member-avatar" style="background:${color}">${initial}</div>
          <div class="member-info">
            <div class="member-name">${label} ${typeTag}</div>
            <div class="member-meta">주요 과목: ${subjects||'없음'} · 마지막 활동: ${a.lastDate||'없음'}</div>
          </div>
          <div class="member-stats">
            <div class="member-stat"><div class="n">${a.entries.length}</div><div class="l">질문수</div></div>
            <div class="member-stat"><div class="n">${getDays(a.entries)}</div><div class="l">출석일</div></div>
            <div class="member-stat"><div class="n">${[...new Set(a.entries.map(e=>e.subject).filter(Boolean))].length}</div><div class="l">과목수</div></div>
          </div>
        </div>`;
    }).join('') : '<div class="empty"><div class="icon">👤</div><p>회원 데이터가 없습니다</p></div>';
  }

  function getDays(entries) {
    const days = new Set(entries.map(e => e.date ? e.date.split(' ')[0] : '').filter(Boolean));
    return days.size;
  }

  // ────────────────────────────────
  // ③ 질문 모아보기
  // ────────────────────────────────
  function renderAllQuestions() {
    let list = [...allEntries];
    const grade   = document.getElementById('qGradeFilter').value;
    const subject = document.getElementById('qSubjectFilter').value;
    const role    = document.getElementById('qRoleFilter').value;
    const search  = document.getElementById('qSearch').value.toLowerCase();

    if (grade   !== 'all') list = list.filter(e => e.grade === grade);
    if (subject !== 'all') list = list.filter(e => e.subject === subject);
    if (role    !== 'all') list = list.filter(e => e.role === role);
    if (search) list = list.filter(e =>
      [e.topic,e.unit,e.q1,e.q2,e.q3].filter(Boolean).some(t => t.toLowerCase().includes(search))
    );

    document.getElementById('qCount').textContent = `총 ${list.length}개의 질문 기록`;
    document.getElementById('questionList').innerHTML = list.length ? list.map(e => `
      <div class="q-card" style="border-left-color:${e.role==='teacher'?'#f59e0b':'#4f46e5'}">
        <div class="q-card-meta">
          <span>${e.role==='teacher'?'👩‍🏫 교사':'🎒 학생'}</span>
          <span>${e.grade||''}</span><span>${e.subject||''}</span>
          ${e.unit?`<span>${e.unit}</span>`:''}
          ${e.topic?`<span style="font-weight:800;color:var(--ink)">${e.topic}</span>`:''}
          ${e.authorKey?`<span style="color:#94a3b8">${getAuthorLabel(e.authorKey)}</span>`:''}
          <span style="margin-left:auto;color:#94a3b8">${e.date||''}</span>
        </div>
        <div class="q-card-qs">
          ${[e.q1,e.q2,e.q3].filter(Boolean).map((q,i)=>`
            <div class="q-card-q">
              <span class="q-card-num" style="background:${['#0ea5e9','#8b5cf6','#10b981'][i]}">Q${i+1}</span>
              <span>${q}</span>
            </div>`).join('')}
        </div>
      </div>`).join('')
    : '<div class="empty"><div class="icon">❓</div><p>조건에 맞는 질문이 없습니다</p></div>';
  }

  // ────────────────────────────────
  // ④ 출석 분석
  // ────────────────────────────────
  function renderAttendance() {
    const typeFilter = document.getElementById('attendFilter').value;
    const sortFilter = document.getElementById('attendSort').value;

    const authorMap = {};
    allEntries.forEach(e => {
      const k = e.authorKey || '(비회원)';
      if (typeFilter !== 'all') {
        if (typeFilter === 'student' && !k.startsWith('student')) return;
        if (typeFilter === 'staff'   && !k.startsWith('staff'))   return;
      }
      if (!authorMap[k]) authorMap[k] = { key: k, entries: [] };
      authorMap[k].entries.push(e);
    });

    let list = Object.values(authorMap);
    if (sortFilter === 'days')   list.sort((a,b) => getDays(b.entries) - getDays(a.entries));
    if (sortFilter === 'total')  list.sort((a,b) => b.entries.length - a.entries.length);
    if (sortFilter === 'recent') list.sort((a,b) => {
      const la = a.entries.reduce((m,e) => e.date>m?e.date:m, '');
      const lb = b.entries.reduce((m,e) => e.date>m?e.date:m, '');
      return lb > la ? 1 : -1;
    });

    const totalDays = list.reduce((s,a)=>s+getDays(a.entries),0);
    const avgDays = list.length ? (totalDays/list.length).toFixed(1) : 0;
    const maxDays = list.length ? getDays(list[0].entries) : 0;

    document.getElementById('attendStats').innerHTML = [
      { label:'출석 집계 회원', value: list.length, color:'#4f46e5' },
      { label:'총 활동일 합계', value: totalDays, color:'#0ea5e9' },
      { label:'인당 평균 출석일', value: avgDays, color:'#10b981' },
      { label:'최다 출석일', value: maxDays, color:'#f59e0b' },
      { label:'총 질문 기록', value: allEntries.length, color:'#f43f5e' },
    ].map(s => `
      <div class="stat-card" style="border-left-color:${s.color}">
        <div class="stat-label">${s.label}</div>
        <div class="stat-value" style="color:${s.color}">${s.value}</div>
      </div>`).join('');

    document.getElementById('attendList').innerHTML = list.length ? list.map(a => {
      const days = getDays(a.entries);
      const allDates = [...new Set(a.entries.map(e=>e.date?e.date.split(' ')[0]:'').filter(Boolean))];
      const dateSet = new Set(allDates);
      const lastDate = allDates.sort().reverse()[0] || '-';

      // 최근 30일 달력
      const calCells = [];
      for (let i=29; i>=0; i--) {
        const d = new Date(); d.setDate(d.getDate()-i);
        const key = d.toLocaleDateString('ko').replace(/\. /g,'.').replace(/\.$/,'');
        const count = a.entries.filter(e=>e.date&&e.date.startsWith(key)).length;
        const dayNum = d.getDate();
        calCells.push(`<div class="attend-day ${count>0?'has-entry':''}" data-tip="${key} ${count}개">${dayNum}</div>`);
      }

      return `
        <div class="member-card" style="flex-direction:column;align-items:stretch;gap:12px;">
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="member-avatar" style="background:#4f46e5;font-size:14px">${getAuthorLabel(a.key).charAt(0)}</div>
            <div class="member-info">
              <div class="member-name">${getAuthorLabel(a.key)}</div>
              <div class="member-meta">출석일: <strong style="color:#4f46e5">${days}일</strong> · 총 질문: <strong>${a.entries.length}개</strong> · 마지막: ${lastDate}</div>
            </div>
          </div>
          <div>
            <div class="month-label">최근 30일 활동 캘린더</div>
            <div class="attend-grid">${calCells.join('')}</div>
          </div>
        </div>`;
    }).join('') : '<div class="empty"><div class="icon">📅</div><p>출석 데이터가 없습니다</p></div>';
  }

  // ────────────────────────────────
  // ⑤ 미션 분석
  // ────────────────────────────────
  function renderMission() {
    const myqCount   = allEntries.length;
    // 미션은 localStorage에서 수집 (현재 기기 기준)
    let kwCount    = 0, champCount = 0, dreamCount = 0, bookCount = 0;
    try { kwCount    = JSON.parse(localStorage.getItem('kw_hall')    ||'[]').length; } catch(e){}
    try { champCount = JSON.parse(localStorage.getItem('champ_hall') ||'[]').length; } catch(e){}
    try { dreamCount = (JSON.parse(localStorage.getItem('dream_answers')||'[]').length + JSON.parse(localStorage.getItem('dream_declares')||'[]').length); } catch(e){}
    try { bookCount  = JSON.parse(localStorage.getItem('book_records')||'[]').length; } catch(e){}

    document.getElementById('missionStats').innerHTML = [
      { label:'오늘의 질문', value: myqCount, icon:'🎒', color:'#0ea5e9' },
      { label:'키워드 게임', value: kwCount,   icon:'🎰', color:'#8b5cf6' },
      { label:'질문 챔피언', value: champCount,icon:'🏆', color:'#f59e0b' },
      { label:'타임머신',    value: dreamCount,icon:'⏰', color:'#10b981' },
      { label:'북콘서트',    value: bookCount, icon:'📚', color:'#f43f5e' },
    ].map(s => `
      <div class="stat-card" style="border-left-color:${s.color}">
        <div class="stat-label">${s.icon} ${s.label}</div>
        <div class="stat-value" style="color:${s.color}">${s.value}</div>
        <div class="stat-sub">누적 기록</div>
      </div>`).join('');

    // 과목별 질문 미션 참여 현황
    const subjectMission = {};
    allEntries.forEach(e => {
      const s = e.subject||'기타';
      subjectMission[s] = (subjectMission[s]||0) + 1;
    });
    const missionColors = ['#0ea5e9','#8b5cf6','#10b981','#f59e0b','#f43f5e','#4f46e5','#14b8a6','#ec4899'];
    const maxVal = Math.max(...Object.values(subjectMission), 1);

    const missionHtml = Object.entries(subjectMission).sort((a,b)=>b[1]-a[1]).map(([s,v],i) => `
      <div class="bar-row">
        <div class="bar-label">${s}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${v/maxVal*100}%;background:${missionColors[i%missionColors.length]}">${v}</div></div>
        <div class="bar-num">${v}</div>
      </div>`).join('');

    document.getElementById('missionKw').innerHTML   = missionHtml || '<p class="empty" style="padding:20px">데이터 없음</p>';
    document.getElementById('missionChamp').innerHTML = `<div style="padding:16px;text-align:center;color:var(--muted)"><div style="font-size:36px;margin-bottom:8px">🏆</div><p>질문 챔피언: <strong>${champCount}회</strong> 기록</p></div>`;
    document.getElementById('missionDream').innerHTML = `<div style="padding:16px;text-align:center;color:var(--muted)"><div style="font-size:36px;margin-bottom:8px">⏰</div><p>타임머신: <strong>${dreamCount}회</strong> 기록</p></div>`;
    document.getElementById('missionBook').innerHTML  = `<div style="padding:16px;text-align:center;color:var(--muted)"><div style="font-size:36px;margin-bottom:8px">📚</div><p>북콘서트: <strong>${bookCount}회</strong> 기록</p></div>`;
  }

  // ────────────────────────────────
  // CSV 내보내기
  // ────────────────────────────────
  function toCSV(headers, rows) {
    const esc = v => '"' + String(v||'').replace(/"/g,'""') + '"';
    return [headers.map(esc).join(','), ...rows.map(r => r.map(esc).join(','))].join('\n');
  }
  function downloadCSV(csv, name) {
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = name; a.click();
  }
  function exportQuestions() {
    const csv = toCSV(
      ['날짜','역할','학년','과목','단원','주제','Q1','Q2','Q3','작성자'],
      allEntries.map(e => [e.date,e.role,e.grade,e.subject,e.unit,e.topic,e.q1,e.q2,e.q3,getAuthorLabel(e.authorKey)])
    );
    downloadCSV(csv, '질문기록_' + new Date().toLocaleDateString('ko') + '.csv');
  }
  function exportMembers() {
    const authorMap = {};
    allEntries.forEach(e => {
      const k = e.authorKey||'(비회원)';
      if (!authorMap[k]) authorMap[k] = { entries: [] };
      authorMap[k].entries.push(e);
    });
    const csv = toCSV(
      ['회원명','유형','질문수','출석일수','주요과목','마지막활동'],
      Object.entries(authorMap).map(([k,a]) => [
        getAuthorLabel(k), k.split('_')[0], a.entries.length,
        getDays(a.entries),
        [...new Set(a.entries.map(e=>e.subject).filter(Boolean))].join('/'),
        a.entries.reduce((m,e)=>e.date>m?e.date:m,'')
      ])
    );
    downloadCSV(csv, '회원분석_' + new Date().toLocaleDateString('ko') + '.csv');
  }
  function exportAttendance() {
    const authorMap = {};
    allEntries.forEach(e => {
      const k = e.authorKey||'(비회원)';
      if (!authorMap[k]) authorMap[k] = { entries: [] };
      authorMap[k].entries.push(e);
    });
    const csv = toCSV(
      ['회원명','출석일수','총질문수','활동일목록'],
      Object.entries(authorMap).map(([k,a]) => [
        getAuthorLabel(k), getDays(a.entries), a.entries.length,
        [...new Set(a.entries.map(e=>e.date?e.date.split(' ')[0]:'').filter(Boolean))].sort().join(' | ')
      ])
    );
    downloadCSV(csv, '출석분석_' + new Date().toLocaleDateString('ko') + '.csv');
  }
</script>
